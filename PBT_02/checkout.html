<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - DHerbal</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        fieldset { margin-bottom: 20px; border: 1px solid #2e7d32; border-radius: 5px; padding: 15px; }
        legend { font-weight: bold; color: #2e7d32; padding: 0 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .inline-label { display: inline; font-weight: normal; margin-right: 15px; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .bonus-section { background-color: #e8f5e9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        button[type="submit"] { background-color: #2e7d32; color: white; padding: 10px 20px; border: none; font-size: 16px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Tiến hành đặt hàng</h1>

    <div class="bonus-section">
        <label for="search_product">🔍 Tìm thêm sản phẩm:</label>
        <input list="product_list" id="search_product" name="search_product" placeholder="Gõ tên sản phẩm...">
        <datalist id="product_list">
            <option value="Áo thun nam"></option>
            <option value="Áo khoác mùa đông"></option>
            <option value="Chân váy nữ"></option>
            <option value="Kính mát"></option>
            <option value="Áo polo trẻ em"></option>
        </datalist>
    </div>

    <h2>1. Giỏ hàng của bạn</h2>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Áo thun nam</td>
                <td>150.000đ</td>
                <td>2</td>
                <td>300.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Chân váy nữ</td>
                <td>145.000đ</td>
                <td>1</td>
                <td>145.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Áo polo trẻ em</td>
                <td>160.000đ</td>
                <td>1</td>
                <td>160.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="4" style="text-align: right;">Tổng cộng:</th>
                <th><strong>605.000đ</strong></th>
            </tr>
        </tfoot>
    </table>

    <form action="#" method="POST">
        
        <fieldset>
            <legend>2. Thông tin giao hàng</legend>

            <div class="form-group">
                <label for="delivery_date">Ngày giao hàng mong muốn:</label>
                <input type="date" id="delivery_date" name="delivery_date" min="2026-04-29" required>
            </div>

            <div class="form-group">
                <label for="delivery_time">Khung giờ giao hàng:</label>
                <select id="delivery_time" name="delivery_time" required>
                    <option value="" disabled selected>-- Chọn khung giờ --</option>
                    <option value="morning">Sáng (8h - 12h)</option>
                    <option value="afternoon">Chiều (14h - 18h)</option>
                    <option value="evening">Tối (18h - 21h)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="delivery_duration">Mức độ linh hoạt giao hàng (tối đa số ngày chờ):</label>
                <input type="range" id="delivery_duration" name="delivery_duration" min="1" max="7" step="1" value="3">
                <small>Giới hạn từ 1 đến 7 ngày.</small>
            </div>
        </fieldset>

        <fieldset>
            <legend>3. Hình thức thanh toán</legend>

            <div class="form-group">
                <label>Phương thức thanh toán:</label>
                <input type="radio" id="pay_cod" name="payment_method" value="cod" required checked>
                <label for="pay_cod" class="inline-label">Thanh toán khi nhận hàng (COD)</label>

                <input type="radio" id="pay_transfer" name="payment_method" value="transfer">
                <label for="pay_transfer" class="inline-label">Chuyển khoản ngân hàng</label>

                <input type="radio" id="pay_ewallet" name="payment_method" value="ewallet">
                <label for="pay_ewallet" class="inline-label">Ví điện tử (Momo/ZaloPay)</label>
            </div>

            <div class="form-group">
                <label for="discount_code">Mã giảm giá (Nếu có):</label>
                <input type="text" id="discount_code" name="discount_code" pattern="^SALE[0-9]{4}$" placeholder="VD: SALE2026" title="Mã phải bắt đầu bằng chữ SALE viết hoa, theo sau là 4 chữ số.">
            </div>

            <div class="form-group">
                <label for="order_notes">Ghi chú cho đơn hàng (Tùy chọn):</label>
                <textarea id="order_notes" name="order_notes" rows="3" placeholder="Ví dụ: Gọi điện trước khi giao..."></textarea>
            </div>
        </fieldset>

        <div class="bonus-section">
            <div class="form-group">
                <label for="loyalty_points">🌟 Điểm tích lũy thành viên:</label>
                <meter id="loyalty_points" min="0" max="100" low="30" high="80" optimum="100" value="80" style="width: 100%; height: 20px;"></meter>
            </div>

            <div class="form-group" style="font-size: 1.2em; font-weight: bold; text-align: right;">
                <label for="final_total" style="display: inline;">Thanh toán thực tế: </label>
                <output id="final_total" name="final_total">605.000đ</output>
            </div>
        </div>

        <div style="text-align: right;">
            <button type="submit" aria-label="Xác nhận đặt hàng">Tiến hành thanh toán</button>
        </div>

    </form>

</body>
</html>
