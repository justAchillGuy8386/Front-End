<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test HTML5 Validation</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 5px; width: 250px; }
    </style>
</head>
<body>
    <h2>Kiểm thử Validation HTML5</h2>
    <form action="#" method="get">
        
        <div class="form-group">
            <label>1. Required (để trống):</label>
            <input type="text" required value="">
        </div>

        <div class="form-group">
            <label>2. Email format:</label>
            <input type="email" value="abc">
        </div>

        <div class="form-group">
            <label>3. Number (min 1, max 10):</label>
            <input type="number" min="1" max="10" value="15">
        </div>

        <div class="form-group">
            <label>4. Pattern (10 chữ số):</label>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </div>

        <div class="form-group">
            <label>5. Password (minlength 8):</label>
            <input type="password" minlength="8" value="123">
        </div>

        <button type="submit">Submit Form</button>

    </form>
</body>
</html>
